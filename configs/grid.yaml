# Hyperparameter grids: 3 LR x 3 WD per optimizer per task

cifar10:
  epochs: 50
  batch_size: 128

  sgd:
    lr: [0.01, 0.05, 0.1]
    weight_decay: [1.0e-4, 5.0e-4, 1.0e-3]
    momentum: 0.9

  adamw:
    lr: [1.0e-3, 3.0e-3, 1.0e-2]
    weight_decay: [0.01, 0.05, 0.1]

  lion:
    lr: [3.0e-5, 1.0e-4, 3.0e-4]
    weight_decay: [0.01, 0.05, 0.1]

  ademamix:
    lr: [1.0e-3, 3.0e-3, 1.0e-2]
    weight_decay: [0.01, 0.05, 0.1]
    alpha: 5.0
    beta3: 0.9999

  soap:
    lr: [1.0e-3, 3.0e-3, 1.0e-2]
    weight_decay: [0.01, 0.05, 0.1]
    precondition_frequency: 10

  muon:
    lr: [1.0e-3, 3.0e-3, 1.0e-2]
    weight_decay: [0.01, 0.05, 0.1]

  schedulefree_adamw:
    lr: [1.0e-3, 3.0e-3, 1.0e-2]
    weight_decay: [0.01, 0.05, 0.1]

ptb:
  max_steps: 50000
  batch_size: 128

  sgd:
    lr: [0.1, 0.5, 1.0]
    weight_decay: [1.0e-4, 5.0e-4, 1.0e-3]
    momentum: 0.9

  adamw:
    lr: [1.0e-3, 3.0e-3, 1.0e-2]
    weight_decay: [0.01, 0.05, 0.1]

  lion:
    lr: [3.0e-5, 1.0e-4, 3.0e-4]
    weight_decay: [0.01, 0.05, 0.1]

  ademamix:
    lr: [1.0e-3, 3.0e-3, 1.0e-2]
    weight_decay: [0.01, 0.05, 0.1]
    alpha: 5.0
    beta3: 0.9999

  soap:
    lr: [1.0e-3, 3.0e-3, 1.0e-2]
    weight_decay: [0.01, 0.05, 0.1]
    precondition_frequency: 10

  muon:
    lr: [1.0e-3, 3.0e-3, 1.0e-2]
    weight_decay: [0.01, 0.05, 0.1]

  schedulefree_adamw:
    lr: [1.0e-3, 3.0e-3, 1.0e-2]
    weight_decay: [0.01, 0.05, 0.1]
